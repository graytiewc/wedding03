  <style>
    :root {
      color-scheme: light;
      --paper: #f7f1ea;
      --ink: #6d4f3d;
      --stage-width: 100vw;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      font-family: "Times New Roman", "Noto Serif SC", serif;
      overflow-x: hidden;
    }

    body.is-intro {
      overflow: hidden;
    }

    button {
      border: 0;
      padding: 0;
      font: inherit;
      background: transparent;
      cursor: pointer;
    }

    .stage {
      position: relative;
      width: 100%;
      min-height: 100svh;
      background: var(--paper);
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 5;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      opacity: 1;
      transition: opacity 900ms ease, filter 900ms ease;
    }

    .intro-frame {
      position: relative;
      width: min(var(--stage-width), calc(100svh * 852 / 1845));
      height: calc(min(var(--stage-width), calc(100svh * 852 / 1845)) * 1845 / 852);
      overflow: hidden;
    }

    .intro-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .intro-bg-alt {
      opacity: 0;
    }

    .intro-frame.is-flashing .intro-bg-alt {
      animation: introFlash 1000ms steps(1, end) infinite;
    }

    .intro-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 47%, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0) 36%),
        linear-gradient(180deg, rgba(255, 255, 255, 0) 76%, rgba(247, 241, 234, 0.38));
    }

    .seal-button {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 85%;
      width: 33.28%;
      aspect-ratio: 1;
      border-radius: 50%;
      animation: sealFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 16px 28px rgba(90, 55, 37, 0.28));
      transition: transform 300ms ease, opacity 500ms ease, filter 300ms ease;
    }

    .seal-button img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .seal-button::before {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(153, 92, 67, 0.32);
      animation: pulseRing 2.6s ease-out infinite;
    }

    .seal-button:focus-visible {
      outline: 2px solid rgba(109, 79, 61, 0.8);
      outline-offset: 8px;
    }

    .seal-button.is-opening {
      animation: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.92) rotate(-4deg);
      filter: drop-shadow(0 9px 18px rgba(90, 55, 37, 0.22));
      pointer-events: none;
    }

    .hint {
      position: absolute;
      z-index: 1;
      left: 50%;
      bottom: 3%;
      transform: translateX(-50%);
      margin: 0;
      color: var(--ink);
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.78;
      transition: opacity 450ms ease;
      white-space: nowrap;
    }

    .intro-wording {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 20%;
      width: 72.42%;
      height: auto;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .intro.is-playing .hint {
      opacity: 0;
    }

    .intro.is-leaving {
      opacity: 0;
      filter: brightness(1.08);
      pointer-events: none;
    }

    .main {
      position: relative;
      width: var(--stage-width);
      max-width: 100%;
      min-height: 100svh;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 900ms ease 180ms, transform 900ms ease 180ms;
    }

    .main.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .main-stage {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .main-stage > img {
      display: block;
      width: 100%;
      height: auto;
      background: var(--paper);
    }

    .countdown {
      position: absolute;
      z-index: 2;
      top: 18.5%;
      left: 50%;
      width: 88%;
      transform: translateX(-50%) scale(1.2);
      transform-origin: top center;
      text-align: center;
      pointer-events: none;
    }

    .countdown-values {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .countdown-item {
      display: flex;
      min-width: 42px;
      flex-direction: column;
      align-items: center;
      color: #2c1b0e;
    }

    .countdown-number {
      font-size: 1.62rem;
      font-weight: 700;
      line-height: 1;
    }

    .countdown-unit {
      margin-top: 4px;
      color: #7d6a55;
      font-size: 0.8rem;
      line-height: 1;
    }

    .main-au {
      position: absolute;
      z-index: 2;
      top: 22%;
      left: 50%;
      width: 48.55%;
      height: auto;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .main-aup1 {
      position: absolute;
      z-index: 2;
      top: 23%;
      left: 50%;
      width: 100%;
      height: auto;
      opacity: 0;
      transform: translateX(-50%) translateY(22px) scale(0.86);
      transform-origin: center center;
      transition: opacity 650ms ease, transform 780ms cubic-bezier(0.2, 0.9, 0.22, 1.18);
      pointer-events: none;
    }

    .main-aup1.is-in-view {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .main-aup2 {
      position: absolute;
      z-index: 2;
      top: 32%;
      left: 28%;
      width: 54.86%;
      height: auto;
      opacity: 0;
      transform: translate(-50%, 22px) scale(0.86);
      transform-origin: center center;
      transition: opacity 650ms ease, transform 780ms cubic-bezier(0.2, 0.9, 0.22, 1.18);
      pointer-events: none;
    }

    .main-aup2.is-in-view {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .main-auw1 {
      position: absolute;
      z-index: 2;
      top: 32.5%;
      left: 55%;
      width: 41.43%;
      height: auto;
      opacity: 0;
      transform: translateY(22px) scale(0.86);
      transform-origin: center center;
      transition: opacity 650ms ease, transform 780ms cubic-bezier(0.2, 0.9, 0.22, 1.18);
      pointer-events: none;
    }

    .main-auw1.is-in-view {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .main-aup3 {
      position: absolute;
      z-index: 3;
      top: 34%;
      left: 75%;
      width: 44.88%;
      height: auto;
      opacity: 0;
      transform: translate(-50%, 22px) scale(0.86);
      transform-origin: center center;
      transition: opacity 650ms ease, transform 780ms cubic-bezier(0.2, 0.9, 0.22, 1.18);
      pointer-events: none;
    }

    .main-aup3.is-in-view {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .main-auw2 {
      position: absolute;
      z-index: 2;
      top: 37%;
      left: 17%;
      width: 53.2%;
      height: auto;
      opacity: 0;
      transform: translateY(22px) scale(0.86);
      transform-origin: center center;
      transition: opacity 650ms ease, transform 780ms cubic-bezier(0.2, 0.9, 0.22, 1.18);
      pointer-events: none;
    }

    .main-auw2.is-in-view {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .main-aup4 {
      position: absolute;
      z-index: 2;
      top: 38%;
      left: 50%;
      width: 100.13%;
      height: auto;
      opacity: 0;
      transform: translate(-50%, 48px);
      transition: opacity 700ms ease, transform 850ms cubic-bezier(0.2, 0.85, 0.22, 1);
      pointer-events: none;
    }

    .main-aup4.is-in-view {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .main-story {
      position: absolute;
      z-index: 2;
      top: 46.5%;
      left: 50%;
      width: 89.64%;
      height: auto;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .main-si {
      position: absolute;
      z-index: 2;
      top: 60%;
      height: auto;
      opacity: 0;
      transform: translate(-50%, 52px) scale(0.92);
      transform-origin: center center;
      transition: opacity 650ms ease, transform 850ms cubic-bezier(0.2, 0.85, 0.22, 1);
      pointer-events: none;
    }

    .main-si1 {
      left: 17%;
      top: 61%;
      width: 26.6%;
    }

    .main-si2 {
      left: 50%;
      width: 32.99%;
    }

    .main-si3 {
      left: 83%;
      top: 61%;
      width: 26.6%;
    }

    .main-si.is-in-view {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      animation: softFloat 3.4s ease-in-out infinite;
    }

    .main-si2.is-in-view {
      animation-delay: 220ms;
    }

    .main-si3.is-in-view {
      animation-delay: 440ms;
    }

    .btn-location {
      position: absolute;
      z-index: 3;
      top: 74%;
      left: 50%;
      width: 66.75%;
      height: auto;
      transform: translateX(-50%);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .btn-location img {
      display: block;
      width: 100%;
      height: auto;
    }

    .btn-location:active {
      transform: translateX(-50%) scale(0.96);
      filter: brightness(0.94);
    }

    .btn-contact {
      position: absolute;
      z-index: 3;
      top: 82.75%;
      width: 29.41%;
      height: auto;
      transform: translateX(-50%);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .btn-contact-left {
      left: 25%;
    }

    .btn-contact-right {
      left: 75%;
    }

    .btn-contact img {
      display: block;
      width: 100%;
      height: auto;
    }

    .btn-contact:active {
      transform: translateX(-50%) scale(0.96);
      filter: brightness(0.94);
    }

    .btn-photo {
      position: absolute;
      z-index: 3;
      top: 87%;
      left: 50%;
      width: 66.75%;
      height: auto;
      transform: translateX(-50%);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .btn-photo img {
      display: block;
      width: 100%;
      height: auto;
    }

    .btn-photo:active {
      transform: translateX(-50%) scale(0.96);
      filter: brightness(0.94);
    }

    .rsvp-panel {
      position: absolute;
      z-index: 3;
      top: 89%;
      left: 50%;
      width: min(90%, 340px);
      padding: 14px 16px;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      color: #3d2b18;
      transform: translateX(-50%);
    }

    .rsvp-title {
      margin-bottom: 10px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
    }

    .rsvp-field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .rsvp-field span {
      color: #7f6a54;
    }

    .rsvp-field input,
    .rsvp-field textarea {
      width: 100%;
      border: 1px solid rgba(149, 125, 94, 0.4);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.9);
      color: #3d2b18;
      font-size: 14px;
    }

    .rsvp-field textarea {
      resize: vertical;
    }

    .rsvp-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .rsvp-actions button {
      flex: 1 1 45%;
      min-width: 120px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .rsvp-actions button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    #rsvpSubmit {
      background: #d4b18f;
      color: #fff;
    }

    #viewBlessings {
      border: 1px solid rgba(79, 58, 37, 0.18);
      background: #f8f4ef;
      color: #4f3a25;
    }

    #rsvpSubmit:active,
    #viewBlessings:active {
      transform: translateY(1px);
    }

    .blessings-panel {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(149, 125, 94, 0.22);
    }

    .blessings-panel[hidden] {
      display: none;
    }

    .blessings-header {
      margin-bottom: 8px;
      color: #4f3a25;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    .total-attendees {
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(212, 177, 143, 0.18);
      color: #4f3a25;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .blessings-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .blessings-item {
      padding: 10px 12px;
      border: 1px solid rgba(149, 125, 94, 0.22);
      border-radius: 8px;
      background: rgba(248, 244, 239, 0.82);
    }

    .blessings-meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 5px;
      color: #3d2b18;
      font-size: 12px;
    }

    .blessings-meta strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .blessings-meta span,
    .blessings-empty {
      color: #7f6a54;
      font-size: 12px;
      white-space: nowrap;
    }

    .blessings-message {
      color: #4f3a25;
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .thank-you-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(61, 43, 24, 0.34);
    }

    .thank-you-modal[hidden] {
      display: none;
    }

    .thank-you-card {
      position: relative;
      width: min(86vw, 330px);
      padding: 28px 22px 22px;
      border: 1px solid rgba(149, 125, 94, 0.28);
      border-radius: 16px;
      background: rgba(255, 250, 244, 0.98);
      box-shadow: 0 22px 50px rgba(61, 43, 24, 0.22);
      color: #3d2b18;
      text-align: center;
    }

    .thank-you-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 34px;
      height: 34px;
      color: #8b7258;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }

    .thank-you-icon {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: #d4b18f;
      color: #fff;
      font-size: 30px;
      font-weight: 700;
    }

    .thank-you-title {
      margin-bottom: 8px;
      font-size: 22px;
      font-weight: 700;
    }

    .thank-you-text {
      color: #7f6a54;
      font-size: 14px;
      line-height: 1.6;
    }

    .thank-you-ok {
      width: 100%;
      margin-top: 18px;
      border-radius: 999px;
      padding: 11px 16px;
      background: #3d2b18;
      color: #fff7ef;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .thank-you-close:active,
    .thank-you-ok:active {
      transform: scale(0.96);
    }

    .wash {
      position: fixed;
      inset: 0;
      z-index: 6;
      background: var(--paper);
      opacity: 0;
      pointer-events: none;
      transition: opacity 700ms ease;
    }

    .wash.is-on {
      opacity: 1;
    }

    @keyframes sealFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, calc(-50% - 7px)) scale(1.015);
      }
    }

    @keyframes pulseRing {
      0% {
        box-shadow: 0 0 0 0 rgba(153, 92, 67, 0.28);
      }
      72%,
      100% {
        box-shadow: 0 0 0 28px rgba(153, 92, 67, 0);
      }
    }

    @keyframes introFlash {
      0%,
      49.99% {
        opacity: 0;
      }
      50%,
      100% {
        opacity: 1;
      }
    }

    @keyframes softFloat {
      0%,
      100% {
        transform: translate(-50%, 0) scale(1);
      }
      50% {
        transform: translate(-50%, -10px) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @media (min-width: 481px) {
      :root {
        --stage-width: 375px;
      }
    }
  </style>
</head>
<body class="is-intro">

      <img class="main-au" src="images/au.png" alt="">

      <img class="main-auw1" src="images/auw1.png" alt="">

      <img class="main-aup4" src="images/aup4.png" alt="">

          <img src="images/seal.png" alt="">
        </button>
        <p class="hint">Tap to open</p>
      </div>
    </section>

    <div class="wash" id="wash" aria-hidden="true"></div>
  </div>

  <div id="thankYouModal" class="thank-you-modal" hidden>
    <div class="thank-you-card" role="dialog" aria-modal="true" aria-labelledby="thankYouTitle">
      <button id="thankYouClose" class="thank-you-close" type="button" aria-label="Close">x</button>
      <div class="thank-you-icon">!</div>
      <div id="thankYouTitle" class="thank-you-title">Thank You!</div>
      <div class="thank-you-text">Your RSVP has been received.<br>Thank you for your wishes.</div>
      <button id="thankYouOk" class="thank-you-ok" type="button">OK</button>
    </div>
  </div>

  <audio id="introAudio" src="inbgm1.MP3" preload="auto"></audio>
  <audio id="mainAudio" src="bgm.mp3" preload="auto" loop></audio>
  <audio id="clickAudio" src="click.mp3" preload="auto"></audio>

  <script>
    const body = document.body;
    const intro = document.getElementById("intro");
    const introFrame = document.getElementById("introFrame");
    const main = document.getElementById("main");
    const sealButton = document.getElementById("sealButton");
    const audio = document.getElementById("introAudio");
    const mainAudio = document.getElementById("mainAudio");
    const clickAudio = document.getElementById("clickAudio");
    const wash = document.getElementById("wash");
    const countdownTarget = new Date("2026-11-21T18:00:00");
    const countdownDays = document.getElementById("days");
    const countdownHours = document.getElementById("hours");
    const countdownMinutes = document.getElementById("minutes");
    const countdownSeconds = document.getElementById("seconds");
    const animatedItems = document.querySelectorAll(".main-aup1, .main-aup2, .main-auw1, .main-aup3, .main-auw2, .main-aup4, .main-si");
    const API_URL = "https://script.google.com/macros/s/AKfycbweTECUOsdbGDtk9ZvtX-yqmHYkEWGjyKPvGhLsqwBAvrvMb8tWkD1xBKplIbeq-NTlJg/exec";
    const rsvpSubmit = document.getElementById("rsvpSubmit");
    const viewBlessings = document.getElementById("viewBlessings");
    const rsvpName = document.getElementById("rsvp-name");
    const rsvpGuest = document.getElementById("rsvp-guest");
    const rsvpMessage = document.getElementById("rsvp-message");
    const blessingsPanel = document.getElementById("blessingsPanel");
    const blessingsList = document.getElementById("blessingsList");
    const totalAttendees = document.getElementById("totalAttendees");
    const thankYouModal = document.getElementById("thankYouModal");
    const thankYouClose = document.getElementById("thankYouClose");
    const thankYouOk = document.getElementById("thankYouOk");

    let hasOpened = false;
    let hasRevealed = false;
    let revealTimer = 0;

    function playClickSound() {
      clickAudio.currentTime = 0;
      clickAudio.play().catch(() => {});
    }

    document.addEventListener("click", (event) => {
      if (event.target.closest("button, a")) {
        playClickSound();
      }
    });

    function revealMain() {
      if (hasRevealed) return;
      hasRevealed = true;
      window.clearTimeout(revealTimer);
      wash.classList.add("is-on");

      window.setTimeout(() => {
        intro.classList.add("is-leaving");
        main.classList.add("is-visible");
        main.removeAttribute("aria-hidden");
        body.classList.remove("is-intro");
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        mainAudio.currentTime = 0;
        mainAudio.play().catch(() => {});
      }, 420);

      window.setTimeout(() => {
        wash.classList.remove("is-on");
        intro.remove();
      }, 1120);
    }

    async function openInvitation() {
      if (hasOpened) return;
      hasOpened = true;

      sealButton.classList.add("is-opening");
      intro.classList.add("is-playing");
      introFrame.classList.add("is-flashing");

      try {
        audio.currentTime = 0;
        await audio.play();
        if (Number.isFinite(audio.duration) && audio.duration > 2) {
          revealTimer = window.setTimeout(revealMain, (audio.duration - 2) * 1000);
        }
      } catch (error) {
        revealMain();
      }
    }

    audio.addEventListener("loadedmetadata", () => {
      if (!hasOpened || hasRevealed || revealTimer) return;
      if (Number.isFinite(audio.duration) && audio.duration > 2) {
        revealTimer = window.setTimeout(revealMain, (audio.duration - audio.currentTime - 2) * 1000);
      }
    });

    function updateCountdown() {
      let diff = countdownTarget - new Date();
      if (diff < 0) diff = 0;

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);

      countdownDays.textContent = String(days).padStart(2, "0");
      countdownHours.textContent = String(hours).padStart(2, "0");
      countdownMinutes.textContent = String(minutes).padStart(2, "0");
      countdownSeconds.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    window.setInterval(updateCountdown, 1000);

    function showMessage(text) {
      window.alert(text);
    }

    function showThankYouModal() {
      thankYouModal.hidden = false;
    }

    function hideThankYouModal() {
      thankYouModal.hidden = true;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getGuestCount(item) {
      return Number(item.pax ?? item.guests ?? item.guestCount ?? 0) || 0;
    }

    function getWishMessage(item) {
      return item.wishes ?? item.message ?? item.wish ?? "";
    }

    function renderBlessings(list) {
      const attendeeCount = list.reduce((total, item) => total + getGuestCount(item), 0);
      totalAttendees.textContent = `Total Attendees: ${attendeeCount}`;
      blessingsList.innerHTML = list.length
        ? list.map((item) => `
          <div class="blessings-item">
            <div class="blessings-meta">
              <strong>${escapeHtml(item.name || "Guest")}</strong>
              <span>${escapeHtml(getGuestCount(item))} pax</span>
            </div>
            <div class="blessings-message">${escapeHtml(getWishMessage(item) || "No message")}</div>
          </div>
        `).join("")
        : "<div class=\"blessings-empty\">No guest wishes yet.</div>";
      blessingsPanel.hidden = false;
    }

    thankYouClose.addEventListener("click", hideThankYouModal);
    thankYouOk.addEventListener("click", hideThankYouModal);
    thankYouModal.addEventListener("click", (event) => {
      if (event.target === thankYouModal) {
        hideThankYouModal();
      }
    });

    rsvpSubmit.addEventListener("click", () => {
      const name = rsvpName.value.trim();
      const guestCount = rsvpGuest.value.trim();
      const message = rsvpMessage.value.trim();

      if (!name || !guestCount) {
        showMessage("Please enter your name and pax.");
        return;
      }

      const originalSubmitText = rsvpSubmit.textContent;
      rsvpSubmit.disabled = true;
      rsvpSubmit.textContent = "Sending...";

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          name,
          pax: guestCount,
          guests: guestCount,
          wishes: message,
          message
        })
      })
        .then((response) => response.json())
        .then((result) => {
          if (result.success || result.status === "success" || result.result === "success") {
            showThankYouModal();
            rsvpName.value = "";
            rsvpGuest.value = "";
            rsvpMessage.value = "";
          } else {
            console.error("RSVP API returned an error:", result);
            showMessage("Check-in failed. Please try again later.");
          }
        })
        .catch((error) => {
          console.error("RSVP request failed:", error);
          showMessage("Check-in failed. Please check your network and try again.");
        })
        .finally(() => {
          rsvpSubmit.disabled = false;
          rsvpSubmit.textContent = originalSubmitText;
        });
    });

    viewBlessings.addEventListener("click", () => {
      const originalBlessingsText = viewBlessings.textContent;
      viewBlessings.disabled = true;
      viewBlessings.textContent = "Loading...";

      fetch(API_URL)
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          return response.json();
        })
        .then((data) => {
          if (Array.isArray(data)) {
            renderBlessings(data.reverse());
          } else {
            console.error("Unexpected wishes response:", data);
            showMessage("Failed to load guest wishes. Please try again later.");
          }
        })
        .catch((error) => {
          console.error("Guest wishes request failed:", error);
          showMessage("Failed to load guest wishes. Please check your network and try again.");
        })
        .finally(() => {
          viewBlessings.disabled = false;
          viewBlessings.textContent = originalBlessingsText;
        });
    });

    if ("IntersectionObserver" in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-in-view");
          } else {
            entry.target.classList.remove("is-in-view");
          }
        });
      }, {
        root: null,
        threshold: 0.28,
        rootMargin: "0px 0px -8% 0px"
      });

      animatedItems.forEach((item) => observer.observe(item));
    } else {
      animatedItems.forEach((item) => item.classList.add("is-in-view"));
    }

    audio.addEventListener("ended", revealMain, { once: true });
    sealButton.addEventListener("click", openInvitation);
  </script>
</body>
</html>
